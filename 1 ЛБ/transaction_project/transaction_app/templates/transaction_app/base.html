<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Моніторинг транзакцій</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --primary-light: #e0e7ff;
            --background: #f8fafc;
            --card-bg: #ffffff;
            --text-dark: #0f172a;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --debit-color: #ef4444;
            --debit-bg: #fee2e2;
            --credit-color: #10b981;
            --credit-bg: #d1fae5;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            padding: 40px 20px;
            background: radial-gradient(circle at top right, #e0e7ff 0%, #f8fafc 40%);
            color: var(--text-dark);
            min-height: 100vh;
            line-height: 1.5;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.25rem;
            font-weight: 700;
            color: var(--text-dark);
            margin: 0 0 8px 0;
            letter-spacing: -0.025em;
        }

        .subtitle {
            color: var(--text-muted);
            margin: 0 0 24px 0;
            font-size: 1rem;
        }

        nav {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            padding: 8px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            width: fit-content;
            box-shadow: var(--shadow-sm);
        }

        nav a {
            text-decoration: none;
            color: var(--text-muted);
            font-weight: 600;
            font-size: 0.95rem;
            padding: 10px 20px;
            border-radius: 8px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        nav a:hover {
            color: var(--primary);
            background: rgba(99, 102, 241, 0.08);
        }

        nav a.active {
            color: #ffffff;
            background: var(--primary);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.25);
        }

        /* Forms styling */
        .form-box {
            background: var(--card-bg);
            padding: 28px;
            max-width: 440px;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-lg);
            margin-bottom: 40px;
            transition: transform 0.2s ease;
        }

        .form-box:hover {
            transform: translateY(-2px);
        }

        form p {
            margin-bottom: 18px;
        }

        form label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            font-size: 0.875rem;
            color: var(--text-dark);
        }

        form input, form select, form textarea {
            width: 100%;
            padding: 10px 14px;
            font-family: inherit;
            font-size: 0.95rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            box-sizing: border-box;
            background-color: #f8fafc;
            color: var(--text-dark);
            transition: all 0.2s;
        }

        form input:focus, form select:focus {
            outline: none;
            border-color: var(--primary);
            background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
        }

        form button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            border-radius: 8px;
            width: 100%;
            box-sizing: border-box;
            transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.15);
            margin-top: 10px;
        }

        form button:hover {
            background: var(--primary-hover);
            box-shadow: 0 6px 16px rgba(99, 102, 241, 0.25);
            transform: translateY(-1px);
        }

        form button:active {
            transform: translateY(0);
        }

        /* Tables styling */
        .table-container {
            background: var(--card-bg);
            border-radius: 16px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-md);
            overflow: hidden;
            margin-bottom: 40px;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            margin: 0;
        }

        th, td {
            padding: 16px 24px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }

        th {
            background: #fafafa;
            color: var(--text-dark);
            font-weight: 600;
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:nth-child(even) {
            background: #f8fafc;
        }

        tr:hover {
            background: #f1f5f9;
            transition: background 0.15s ease;
        }

        td {
            font-size: 0.95rem;
            color: var(--text-dark);
        }

        /* Badges for debit/credit */
        .debit {
            color: var(--debit-color);
            background-color: var(--debit-bg);
            padding: 4px 10px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.85rem;
            display: inline-block;
        }

        .credit {
            color: var(--credit-color);
            background-color: var(--credit-bg);
            padding: 4px 10px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.85rem;
            display: inline-block;
        }

        h2 {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-dark);
            margin: 40px 0 20px 0;
            letter-spacing: -0.02em;
        }

        h3 {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-dark);
            margin: 30px 0 15px 0;
            letter-spacing: -0.01em;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        h3::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 18px;
            background: var(--primary);
            border-radius: 2px;
        }

        .empty-row {
            text-align: center;
            color: var(--text-muted);
            padding: 32px;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Моніторинг транзакцій</h1>
            <p class="subtitle">Аналіз доходів і витрат за категоріями</p>
            <nav>
                <a href="{% url 'home' %}" id="nav-home">Транзакції</a>
                <a href="{% url 'by_category' %}" id="nav-category">За категоріями</a>
            </nav>
        </header>
        <main>
            {% block content %}{% endblock %}
        </main>
    </div>
    
    <script>
        const currentPath = window.location.pathname;
        if (currentPath.includes('categories')) {
            document.getElementById('nav-category').classList.add('active');
        } else {
            document.getElementById('nav-home').classList.add('active');
        }
    </script>
</body>
</html>
